# .github/workflows/ci-cd.yml

name: CI/CD Pipeline

# ── When does this workflow run? ───────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# ── Jobs ───────────────────────────────────────────────────────
jobs:

  # ═══════════════════════════════════════════════════════════
  # JOB 1 — Run pytest
  # ═══════════════════════════════════════════════════════════
  test:
    name: Run pytest suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Build ChromaDB index
        run: python -m app.ingest

      - name: Run pytest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m pytest tests/ -v

  # ═══════════════════════════════════════════════════════════
  # JOB 2 — Deploy to HuggingFace (only if tests pass)
  # ═══════════════════════════════════════════════════════════
  deploy:
    name: Deploy to HuggingFace Space
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch HuggingFace README to preserve it
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          curl -L \
            -H "Authorization: Bearer $HF_TOKEN" \
            -o README.md \
            https://huggingface.co/spaces/aliabbi/dutch-constitution-qa/raw/main/README.md

          echo "✅ HuggingFace README preserved for deploy:"
          head -15 README.md

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions Bot"

          git add README.md
          git commit -m "Use HuggingFace README for deploy" || echo "No README change"

          git remote add huggingface \
            https://aliabbi:$HF_TOKEN@huggingface.co/spaces/aliabbi/dutch-constitution-qa

          git push --force huggingface main